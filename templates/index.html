<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #eee; padding: 2rem; max-width: 700px; }
    h1 { margin-bottom: 1.5rem; font-size: 1.4rem; }
    h2 { font-size: 1rem; margin-bottom: 1rem; }
    section { border: 1px solid #333; padding: 1.5rem; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #2a2a2a; vertical-align: middle; }
    th { color: #888; font-size: 0.85rem; }
    .actions { display: flex; gap: 0.4rem; justify-content: flex-end; }
    button { background: #222; color: #eee; border: 1px solid #444; padding: 0.35rem 0.7rem;
             cursor: pointer; font-family: monospace; font-size: 0.85rem; white-space: nowrap; }
    button:hover { background: #333; }
    button.danger { color: #f66; border-color: #633; }
    button.danger:hover { background: #311; }
    button.primary { color: #8cf; border-color: #468; }
    button.primary:hover { background: #224; }
    select { background: #222; color: #eee; border: 1px solid #444; padding: 0.35rem;
             font-family: monospace; font-size: 0.85rem; }
    select.inline { width: 100%; }
    input[type=file] { color: #aaa; font-family: monospace; font-size: 0.85rem; }
    .status { margin: 0.75rem 0; min-height: 1.4rem; color: #aaa; font-size: 0.85rem; }
    .uid { font-size: 0.85rem; color: #8cf; margin-bottom: 0.5rem; }
    .row { display: flex; gap: 0.5rem; align-items: center; }
    .empty { color: #555; font-style: italic; }
    .reassign-row td { padding-top: 0; padding-bottom: 0.75rem; }
    .reassign-row .row { padding: 0.5rem 0; }
  </style>
</head>
<body>
  <h1>Soundbox</h1>

  <!-- Tag mappings table -->
  <section>
    <h2>Tag Mappings</h2>
    <table>
      <thead><tr><th>UID</th><th>File</th><th></th></tr></thead>
      <tbody id="tags-body">
        <tr><td colspan="3" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </section>

  <!-- Register new tag -->
  <section>
    <h2>Register New Tag</h2>
    <div class="status" id="reg-status">Press "Scan tag" then tap an NFC tag.</div>
    <div class="uid" id="reg-uid"></div>

    <div id="scan-controls">
      <button class="primary" onclick="startScan()">Scan tag</button>
    </div>

    <div id="assign-controls" style="display:none">
      <select id="file-select" class="inline" style="margin-bottom:0.5rem"></select>
      <div class="row">
        <button class="primary" onclick="saveMapping()">Save</button>
        <button onclick="cancelScan()">Cancel</button>
      </div>
    </div>
  </section>

  <!-- Upload file -->
  <section>
    <h2>Upload Sound File</h2>
    <div class="row" style="margin-bottom:0.5rem">
      <input type="file" id="upload-input" accept=".mp3">
      <button class="primary" onclick="uploadFile()">Upload</button>
    </div>
    <div class="status" id="upload-status"></div>
  </section>

  <script>
    let pollInterval = null;
    let scannedUid = null;
    let allFiles = [];

    // ── Tags table ──────────────────────────────────────────────

    async function loadTags() {
      const res = await fetch('/api/tags');
      const data = await res.json();
      allFiles = await (await fetch('/api/files')).json();

      const tbody = document.getElementById('tags-body');
      const entries = Object.entries(data.tags);
      if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">No tags registered yet.</td></tr>';
        return;
      }
      tbody.innerHTML = entries.map(([uid, file]) => `
        <tr id="row-${btoa(uid)}">
          <td>${uid}</td>
          <td>${file.split('/').pop()}</td>
          <td>
            <div class="actions">
              <button onclick="startReassign(${JSON.stringify(uid)}, ${JSON.stringify(file)})">reassign</button>
              <button class="danger" onclick="deleteTag(${JSON.stringify(uid)})">delete</button>
            </div>
          </td>
        </tr>
        <tr class="reassign-row" id="reassign-${btoa(uid)}" style="display:none">
          <td colspan="3">
            <div class="row">
              <select id="sel-${btoa(uid)}" class="inline">
                ${allFiles.map(f => `<option value="${f}" ${f===file?'selected':''}>${f.split('/').pop()}</option>`).join('')}
              </select>
              <button class="primary" onclick="saveReassign(${JSON.stringify(uid)})">save</button>
              <button onclick="cancelReassign(${JSON.stringify(uid)})">cancel</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function startReassign(uid, currentFile) {
      const key = btoa(uid);
      document.getElementById('reassign-' + key).style.display = '';
    }

    function cancelReassign(uid) {
      document.getElementById('reassign-' + btoa(uid)).style.display = 'none';
    }

    async function saveReassign(uid) {
      const file = document.getElementById('sel-' + btoa(uid)).value;
      await fetch('/api/tags', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, file })
      });
      loadTags();
    }

    async function deleteTag(uid) {
      await fetch('/api/tags/' + encodeURIComponent(uid), { method: 'DELETE' });
      loadTags();
    }

    // ── Register new tag ────────────────────────────────────────

    async function startScan() {
      scannedUid = null;
      document.getElementById('reg-uid').textContent = '';
      document.getElementById('assign-controls').style.display = 'none';
      document.getElementById('scan-controls').style.display = 'block';
      document.getElementById('reg-status').textContent = 'Scanning... tap an NFC tag now.';
      await fetch('/api/register/start', { method: 'POST' });

      pollInterval = setInterval(async () => {
        const data = await (await fetch('/api/register/poll')).json();
        if (data.uid) {
          clearInterval(pollInterval);
          scannedUid = data.uid;
          document.getElementById('reg-uid').textContent = 'UID: ' + data.uid;
          document.getElementById('reg-status').textContent = 'Tag detected. Choose a sound file:';
          document.getElementById('scan-controls').style.display = 'none';

          const sel = document.getElementById('file-select');
          const files = await (await fetch('/api/files')).json();
          sel.innerHTML = files.map(f => `<option value="${f}">${f.split('/').pop()}</option>`).join('');
          document.getElementById('assign-controls').style.display = 'block';
        }
      }, 500);
    }

    async function saveMapping() {
      const file = document.getElementById('file-select').value;
      await fetch('/api/tags', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid: scannedUid, file })
      });
      await fetch('/api/register/cancel', { method: 'POST' });
      document.getElementById('assign-controls').style.display = 'none';
      document.getElementById('scan-controls').style.display = 'block';
      document.getElementById('reg-status').textContent = 'Saved!';
      document.getElementById('reg-uid').textContent = '';
      scannedUid = null;
      loadTags();
    }

    async function cancelScan() {
      clearInterval(pollInterval);
      await fetch('/api/register/cancel', { method: 'POST' });
      document.getElementById('assign-controls').style.display = 'none';
      document.getElementById('scan-controls').style.display = 'block';
      document.getElementById('reg-status').textContent = 'Cancelled.';
      document.getElementById('reg-uid').textContent = '';
      scannedUid = null;
    }

    // ── Upload ──────────────────────────────────────────────────

    async function uploadFile() {
      const input = document.getElementById('upload-input');
      const status = document.getElementById('upload-status');
      if (!input.files.length) { status.textContent = 'No file selected.'; return; }
      const file = input.files[0];
      if (!file.name.toLowerCase().endsWith('.mp3')) {
        status.textContent = 'Only .mp3 files allowed.';
        return;
      }
      status.textContent = 'Uploading...';
      const form = new FormData();
      form.append('file', file);
      const res = await fetch('/api/upload', { method: 'POST', body: form });
      const data = await res.json();
      if (data.ok) {
        status.textContent = 'Uploaded: ' + file.name;
        input.value = '';
        loadTags(); // refresh file lists
      } else {
        status.textContent = 'Error: ' + (data.error || 'upload failed');
      }
    }

    loadTags();
  </script>
</body>
</html>
